name = "canfly-profile"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Wildcard subdomain route: *.canfly.ai
# 1. Add DNS wildcard CNAME: *.canfly.ai → canfly.ai (proxied)
# 2. Add Worker Route in Cloudflare dashboard: *.canfly.ai/* → canfly-profile
# 3. Privy Allowed Domains: add *.canfly.ai
# SSL wildcard certificate is automatic with Cloudflare proxy enabled.

# No KV needed — this worker is a pure proxy to the main site's /u/ routes.
