name: Fix LittleLobster API Key

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: d1 execute canfly-community --remote --command "UPDATE agents SET api_key = 'REDACTED_API_KEY' WHERE name = 'LittleLobster'"
