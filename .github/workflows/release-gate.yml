name: Release Gate Check

on:
  workflow_dispatch:
  pull_request:
    labels: [v3]

jobs:
  release-gate:
    name: Release Gate Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate checks
        run: ./scripts/release-gate-check.sh

      - name: Post results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let output;
            try {
              output = execSync('./scripts/release-gate-check.sh 2>&1', { encoding: 'utf8' });
            } catch (e) {
              output = e.stdout || e.message;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Release Gate Results\n\n\`\`\`\n${output}\n\`\`\``
            });
